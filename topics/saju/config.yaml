# ── Identity ──────────────────────────────────────────────────────────────────
topic: "사주"
channel_name: "saju_daily"

# ── Card queue (relative to repo root) ────────────────────────────────────────
# Drop pre-generated standalone HTML cards into cards_dir. queue.json records
# which cards have already been posted; anything not recorded is "pending".
cards_dir: "./topics/saju/cards"
queue_path: "./topics/saju/queue.json"

# ── Production ────────────────────────────────────────────────────────────────
production:
  short_duration_secs: 7
  audio:
    mode: pixabay             # pixabay | local | none
    genre: ambient
    local_path: ""            # used only when mode=local

# ── YouTube metadata ──────────────────────────────────────────────────────────
# Per-card title/description/tags come from the card HTML <head>. These are
# appended/defaults applied on top.
youtube:
  title_suffix: " #Shorts"
  description_footer: "\n\n#Shorts #사주 #운명 #오늘의운세 #사주팔자"
  category_id: "22"           # People & Blogs
  privacy: "public"
  made_for_kids: false

# ── Schedule (documentation only — enforced in GH Actions) ────────────────────
upload_schedule: "0 9 * * *"
