# ── Identity ──────────────────────────────────────────────────────────────────
topic: "사주"
channel_name: "saju_daily"

# ── Paths (relative to repo root) ─────────────────────────────────────────────
kb_path: "./topics/saju/kb"
planning_prompt_path: "./topics/saju/planning_prompt.txt"
history_path: "./topics/saju/history.json"

# ── Template ──────────────────────────────────────────────────────────────────
template: "card_style_a"

# ── Phase 1 — Planning (Claude) ───────────────────────────────────────────────
planning:
  model: "claude-opus-4-8"
  max_tokens: 1024
  history_lookback: 30        # how many past entries to send Claude to avoid repeats

# ── Phase 2 — Production ──────────────────────────────────────────────────────
production:
  short_duration_secs: 7
  audio:
    mode: pixabay             # pixabay | local | none
    genre: ambient
    local_path: ""            # used only when mode=local

# ── YouTube metadata ──────────────────────────────────────────────────────────
youtube:
  title_suffix: " #Shorts"
  description_footer: "\n\n#Shorts #사주 #운명 #오늘의운세 #사주팔자"
  category_id: "22"           # People & Blogs
  privacy: "public"
  made_for_kids: false

# ── Schedule (documentation only — enforced in GH Actions matrix) ─────────────
upload_schedule: "0 9 * * *"
