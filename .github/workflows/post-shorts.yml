name: Post YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'          # 09:00 UTC daily
  workflow_dispatch:
    inputs:
      topic:
        description: 'Run a single topic only (leave empty to run all)'
        type: string
        default: ''
      count:
        description: 'How many pending cards to post per topic'
        type: string
        default: '1'
      dry_run:
        description: 'Build MP4 but skip YouTube upload'
        type: boolean
        default: false

jobs:
  # ── Discover topics automatically from the topics/ directory ────────────────
  # Any folder containing a config.yaml becomes a channel. No YAML editing needed
  # to add one — just drop in topics/<slug>/ and its <SLUG>_YOUTUBE_* secrets.
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build topic matrix
        id: list
        env:
          TOPIC_FILTER: ${{ inputs.topic }}
        run: |
          topics=$(
            for d in topics/*/; do
              [ -f "${d}config.yaml" ] || continue
              slug=$(basename "$d")
              if [ -z "$TOPIC_FILTER" ] || [ "$TOPIC_FILTER" = "$slug" ]; then
                echo "$slug"
              fi
            done | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )
          echo "Discovered topics: $topics"
          echo "matrix={\"topic\":$topics}" >> "$GITHUB_OUTPUT"

  post:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '' && needs.discover.outputs.matrix != '{"topic":[]}' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false            # one topic failing shouldn't cancel the others
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      # Secret names follow the convention <SLUG>_YOUTUBE_* (context keys are
      # case-insensitive, so the lowercase folder name matches uppercase secrets).
      - name: Write OAuth token
        run: echo "$YT_TOKEN_JSON" > token_${{ matrix.topic }}.json
        env:
          YT_TOKEN_JSON: ${{ secrets[format('{0}_YOUTUBE_TOKEN_JSON', matrix.topic)] }}

      - name: Run pipeline
        run: |
          python app.py \
            --topic ${{ matrix.topic }} \
            --count ${{ inputs.count || '1' }}
        env:
          OAUTH_TOKEN_PATH:      token_${{ matrix.topic }}.json
          YOUTUBE_CLIENT_ID:     ${{ secrets[format('{0}_YOUTUBE_CLIENT_ID', matrix.topic)] }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets[format('{0}_YOUTUBE_CLIENT_SECRET', matrix.topic)] }}
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          DRY_RUN:               ${{ inputs.dry_run || 'false' }}

      - name: Commit updated queue ledger
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics/${{ matrix.topic }}/queue.json
          git diff --staged --quiet || \
            git commit -m "chore(${{ matrix.topic }}): record $(date +%F) post [skip ci]"
          git pull --rebase --autostash && git push
