name: Post YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'          # 09:00 UTC daily
  workflow_dispatch:
    inputs:
      topic:
        description: 'Run a single topic only (leave empty to run all)'
        type: string
        default: ''
      count:
        description: 'How many pending cards to post per topic'
        type: string
        default: '1'
      dry_run:
        description: 'Build MP4 but skip YouTube upload'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false            # one topic failing shouldn't cancel the others
      matrix:
        include:
          - topic: saju
            yt_client_id_secret:     YOUTUBE_CLIENT_ID_SAJU
            yt_client_secret_secret: YOUTUBE_CLIENT_SECRET_SAJU
            yt_token_secret:         YOUTUBE_TOKEN_JSON_SAJU
          # ── Add a new channel: copy this block, change topic + secret names ──
          # - topic: mbti
          #   yt_client_id_secret:     YOUTUBE_CLIENT_ID_MBTI
          #   yt_client_secret_secret: YOUTUBE_CLIENT_SECRET_MBTI
          #   yt_token_secret:         YOUTUBE_TOKEN_JSON_MBTI
          # - topic: zodiac
          #   yt_client_id_secret:     YOUTUBE_CLIENT_ID_ZODIAC
          #   yt_client_secret_secret: YOUTUBE_CLIENT_SECRET_ZODIAC
          #   yt_token_secret:         YOUTUBE_TOKEN_JSON_ZODIAC

    # Skip matrix rows that don't match a manual topic filter
    if: ${{ inputs.topic == '' || inputs.topic == matrix.topic }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Write OAuth token
        run: echo "$YT_TOKEN_JSON" > token_${{ matrix.topic }}.json
        env:
          YT_TOKEN_JSON: ${{ secrets[matrix.yt_token_secret] }}

      - name: Run pipeline
        run: |
          python app.py \
            --topic ${{ matrix.topic }} \
            --count ${{ inputs.count || '1' }}
        env:
          OAUTH_TOKEN_PATH:      token_${{ matrix.topic }}.json
          YOUTUBE_CLIENT_ID:     ${{ secrets[matrix.yt_client_id_secret] }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets[matrix.yt_client_secret_secret] }}
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          DRY_RUN:               ${{ inputs.dry_run || 'false' }}

      - name: Commit updated queue ledger
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics/${{ matrix.topic }}/queue.json
          git diff --staged --quiet || \
            git commit -m "chore(${{ matrix.topic }}): record $(date +%F) post [skip ci]"
          git push
